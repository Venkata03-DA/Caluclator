name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone your repo onto the runner
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Install Python on the runner
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Step 3: Install your project dependencies
      - name: Install dependencies
        run: pip install -r requirements.txt

      # Step 4: Run your tests
      - name: Run tests
        run: pytest test_main.py -v
