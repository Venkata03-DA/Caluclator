name: CI Pipeline

on:
  push:                   #Events that trigger the pipeline
    branches: [main]
  pull_request:
    branches: [main]

jobs:                     # Defines the jobs that will run in the pipeline  
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code            # Steps that will be executed in the job
        uses: actions/checkout@v4
      - name: Set up Python            #set up the Python environment
        uses: actions/setup-python@v5  # Action for setting up Python
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest test_main.py -v
      
      
  build-and-push:                     #job for building and pushing the Docker image
    runs-on: ubuntu-latest
    needs: test              

    steps:
      - name: Checkout code           # Check out the code from the repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub    #log in to Docker Hub using the credentials stored in GitHub Secrets
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}  #Username and password that were created on dokerhub and stored in GitHub Secrets
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image         # Build the Docker image using the Dockerfile in the repository and push it to Docker Hub with the specified tag
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/calculator:latest
      
      
