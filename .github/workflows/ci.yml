name: CI Pipeline

on:
  push:                   #Events that trigger the pipeline
    branches: [main]
  pull_request:
    branches: [main]

jobs:                     # Defines the jobs that will run in the pipeline  
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code            # Steps that will be executed in the job
        uses: actions/checkout@v4
      - name: Set up Python            #set up the Python environment
        uses: actions/setup-python@v5  # Action for setting up Python
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest test_main.py -v
      
      
  build-and-push:                     #job for building and pushing the Docker image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Rule 1: staging branch push → use commit ID as tag
      - name: Push with commit ID (staging)
        if: github.ref_type == 'branch'
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/calculator:${{ github.sha }}

      # Rule 3: tag created on master → use tag name
      - name: Push with tag name (release)
        if: github.ref_type == 'tag'
        uses: docker/build-push-action@v5
        with:
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/calculator:${{ github.ref_name }}
  
      
      
